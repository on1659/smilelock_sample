<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BREAKOUT</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0b;--surface:#111114;--border:#1e1e22;
  --accent:#e8604c;--accent2:#d4453a;
  --text:#e0e0e0;--dim:#444;--dimmer:#2a2a30;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'JetBrains Mono',monospace;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:16px;overflow:hidden;
  -webkit-user-select:none;user-select:none;
}
h1{font-size:20px;font-weight:700;color:#fff;letter-spacing:3px;margin-bottom:2px}
.sub{font-size:10px;color:var(--dim);letter-spacing:1px;margin-bottom:16px}

/* HUD */
.hud{
  display:flex;gap:24px;margin-bottom:12px;
  font-size:11px;color:var(--dim);letter-spacing:1px;
}
.hud span{color:var(--text);font-weight:700}

/* Canvas wrapper */
.canvas-wrap{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:10px;position:relative;
}
canvas{display:block;border-radius:8px}

/* Overlay */
.overlay{
  position:absolute;inset:10px;border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(10,10,11,.85);backdrop-filter:blur(4px);
  transition:opacity .3s;pointer-events:auto;
}
.overlay.hidden{opacity:0;pointer-events:none}
.overlay-title{font-size:22px;font-weight:700;color:#fff;letter-spacing:2px}
.overlay-sub{font-size:11px;color:var(--dim);margin-top:6px;line-height:1.6;text-align:center}
.btn{
  margin-top:18px;padding:12px 32px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:10px;color:#fff;
  font-family:inherit;font-size:13px;font-weight:700;
  cursor:pointer;letter-spacing:0.5px;
  transition:transform .1s,opacity .1s;
}
.btn:hover{opacity:.9;transform:scale(1.02)}
.btn:active{transform:scale(.98)}

/* Game over specific */
.score-big{font-size:48px;font-weight:700;color:var(--accent);margin:8px 0 4px}
.label{font-size:10px;color:var(--dim);letter-spacing:2px}

/* Footer */
.footer{font-size:9px;color:var(--dimmer);margin-top:14px;letter-spacing:1px}

/* Mobile touch area */
.touch-hint{
  font-size:10px;color:var(--dimmer);margin-top:8px;
  letter-spacing:1px;
}
@media(hover:hover){.touch-hint{display:none}}
</style>
</head>
<body>

<h1>BREAKOUT</h1>
<p class="sub">벽돌을 부숴라</p>

<div class="hud">
  <div>SCORE <span id="hScore">0</span></div>
  <div>LIVES <span id="hLives">3</span></div>
  <div>LEVEL <span id="hLevel">1</span></div>
</div>

<div class="canvas-wrap" id="wrap">
  <canvas id="c"></canvas>

  <!-- Start overlay -->
  <div class="overlay" id="oStart">
    <div class="overlay-title">BREAKOUT</div>
    <div class="overlay-sub">마우스 또는 터치로 패들을 움직여<br>모든 벽돌을 부숴라</div>
    <button class="btn" id="bStart">시작하기</button>
  </div>

  <!-- Game over overlay -->
  <div class="overlay hidden" id="oEnd">
    <div class="label">FINAL SCORE</div>
    <div class="score-big" id="finalScore">0</div>
    <div class="overlay-sub" id="endMsg"></div>
    <button class="btn" id="bRestart">다시하기</button>
  </div>

  <!-- Level clear overlay -->
  <div class="overlay hidden" id="oLevel">
    <div class="overlay-title" id="lvlTitle">LEVEL 2</div>
    <div class="overlay-sub">준비됐으면 계속</div>
    <button class="btn" id="bNext">다음 레벨 →</button>
  </div>
</div>

<div class="touch-hint">◀ 터치로 패들 이동 ▶</div>
<div class="footer">HTML + CANVAS · SINGLE FILE</div>

<script>
const $ = id => document.getElementById(id);
const canvas = $('c'), ctx = canvas.getContext('2d');
const wrap = $('wrap');

// ── Sizing ──
const BASE_W = 480, BASE_H = 600;
let scale = 1;

function resize() {
  const maxW = Math.min(window.innerWidth - 40, 480);
  const maxH = Math.min(window.innerHeight - 180, 600);
  scale = Math.min(maxW / BASE_W, maxH / BASE_H, 1);
  canvas.width = Math.floor(BASE_W * scale);
  canvas.height = Math.floor(BASE_H * scale);
  canvas.style.width = canvas.width + 'px';
  canvas.style.height = canvas.height + 'px';
}
resize();
window.addEventListener('resize', () => { resize(); });

// ── Colors ──
const C = {
  bg: '#0d0d10',
  paddle: '#e8604c',
  ball: '#ffffff',
  border: '#1a1a20',
  brickColors: [
    ['#e8604c','#d4453a','#cc3830'], // red row
    ['#e87c4c','#d4693a','#cc5a30'], // orange
    ['#e8b04c','#d49e3a','#cc9030'], // yellow
    ['#7ce84c','#5dd43a','#4ecc30'], // green
    ['#4cb8e8','#3aa0d4','#3090cc'], // cyan
    ['#8c4ce8','#7a3ad4','#6e30cc'], // purple
  ],
  particle: '#e8604c',
};

// ── Game state ──
let state = 'start'; // start | playing | paused | dead | levelup | win
let score = 0, lives = 3, level = 1;
let animId = null;

// Paddle
const paddle = { w: 80, h: 10, x: 0, y: 0, speed: 8, targetX: 0 };

// Ball
const ball = { x: 0, y: 0, vx: 0, vy: 0, r: 5, speed: 5, attached: true };

// Bricks
let bricks = [];
const BRICK_ROWS = 6, BRICK_COLS = 8, BRICK_PAD = 4;
let brickW, brickH;

// Particles
let particles = [];

// ── Brick generation ──
function makeBricks(lvl) {
  bricks = [];
  brickW = (BASE_W - BRICK_PAD * (BRICK_COLS + 1)) / BRICK_COLS;
  brickH = 14;
  const rows = Math.min(BRICK_ROWS + Math.floor((lvl - 1) / 2), 10);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      const ci = r % C.brickColors.length;
      // higher levels get tougher bricks
      let hp = 1;
      if (lvl >= 3 && r < 2) hp = 2;
      if (lvl >= 5 && r < 1) hp = 3;

      bricks.push({
        x: BRICK_PAD + c * (brickW + BRICK_PAD),
        y: 40 + r * (brickH + BRICK_PAD),
        w: brickW, h: brickH,
        alive: true, hp, maxHp: hp,
        color: C.brickColors[ci],
      });
    }
  }
}

// ── Reset positions ──
function resetBall() {
  ball.attached = true;
  ball.x = paddle.x + paddle.w / 2;
  ball.y = paddle.y - ball.r - 1;
  const baseSpeed = 4 + level * 0.5;
  ball.speed = Math.min(baseSpeed, 8);
}

function resetPaddle() {
  paddle.w = Math.max(80 - (level - 1) * 5, 50);
  paddle.x = (BASE_W - paddle.w) / 2;
  paddle.y = BASE_H - 40;
  paddle.targetX = paddle.x;
}

// ── Particles ──
function spawnParticles(x, y, color, count = 6) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.02 + Math.random() * 0.03,
      size: 2 + Math.random() * 3,
      color: color || C.particle,
    });
  }
}

// ── Input ──
let mouseX = BASE_W / 2;

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) / scale;
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.touches[0].clientX - rect.left) / scale;
}, { passive: false });

canvas.addEventListener('click', () => {
  if (state === 'playing' && ball.attached) launchBall();
});
canvas.addEventListener('touchstart', e => {
  if (state === 'playing' && ball.attached) {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.touches[0].clientX - rect.left) / scale;
    launchBall();
  }
}, { passive: true });

function launchBall() {
  ball.attached = false;
  const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.6;
  ball.vx = Math.cos(angle) * ball.speed;
  ball.vy = Math.sin(angle) * ball.speed;
}

// ── Game logic ──
function update() {
  // Paddle follow mouse
  paddle.targetX = mouseX - paddle.w / 2;
  paddle.targetX = Math.max(0, Math.min(BASE_W - paddle.w, paddle.targetX));
  paddle.x += (paddle.targetX - paddle.x) * 0.25;

  if (ball.attached) {
    ball.x = paddle.x + paddle.w / 2;
    ball.y = paddle.y - ball.r - 1;
    return;
  }

  // Ball move
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Wall collision
  if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
  if (ball.x + ball.r > BASE_W) { ball.x = BASE_W - ball.r; ball.vx = -Math.abs(ball.vx); }
  if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); }

  // Bottom — lose life
  if (ball.y + ball.r > BASE_H) {
    lives--;
    $('hLives').textContent = lives;
    if (lives <= 0) {
      gameOver();
      return;
    }
    resetBall();
    return;
  }

  // Paddle collision
  if (
    ball.vy > 0 &&
    ball.y + ball.r >= paddle.y &&
    ball.y + ball.r <= paddle.y + paddle.h + ball.speed &&
    ball.x >= paddle.x - ball.r &&
    ball.x <= paddle.x + paddle.w + ball.r
  ) {
    // Reflect based on hit position
    const hitPos = (ball.x - paddle.x) / paddle.w; // 0~1
    const angle = -Math.PI / 2 + (hitPos - 0.5) * 1.2; // -90° ± 60°
    const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
    ball.vx = Math.cos(angle) * speed;
    ball.vy = Math.sin(angle) * speed;
    ball.y = paddle.y - ball.r - 1;
    spawnParticles(ball.x, ball.y, '#ffffff', 3);
  }

  // Brick collision
  for (const b of bricks) {
    if (!b.alive) continue;
    if (
      ball.x + ball.r > b.x &&
      ball.x - ball.r < b.x + b.w &&
      ball.y + ball.r > b.y &&
      ball.y - ball.r < b.y + b.h
    ) {
      b.hp--;
      if (b.hp <= 0) {
        b.alive = false;
        score += 10 * level;
        spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color[0], 8);
      } else {
        score += 5;
        spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color[0], 3);
      }
      $('hScore').textContent = score;

      // Determine reflection direction
      const overlapLeft = ball.x + ball.r - b.x;
      const overlapRight = b.x + b.w - (ball.x - ball.r);
      const overlapTop = ball.y + ball.r - b.y;
      const overlapBottom = b.y + b.h - (ball.y - ball.r);
      const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

      if (minOverlap === overlapTop || minOverlap === overlapBottom) {
        ball.vy = -ball.vy;
      } else {
        ball.vx = -ball.vx;
      }
      break;
    }
  }

  // Check level clear
  if (bricks.every(b => !b.alive)) {
    levelClear();
  }

  // Particles
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    p.vy += 0.05;
  }
  particles = particles.filter(p => p.life > 0);
}

// ── Draw ──
function draw() {
  ctx.save();
  ctx.scale(scale, scale);

  // BG
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, BASE_W, BASE_H);

  // Subtle grid
  ctx.strokeStyle = '#13131a';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < BASE_W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, BASE_H); ctx.stroke();
  }
  for (let y = 0; y < BASE_H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(BASE_W, y); ctx.stroke();
  }

  // Bricks
  for (const b of bricks) {
    if (!b.alive) continue;
    const ci = b.maxHp - b.hp; // darker as damaged
    const color = b.color[Math.min(ci, b.color.length - 1)];
    ctx.fillStyle = color;
    ctx.beginPath();
    roundRect(ctx, b.x, b.y, b.w, b.h, 3);
    ctx.fill();

    // HP indicator for multi-hp bricks
    if (b.maxHp > 1) {
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.font = '8px JetBrains Mono';
      ctx.textAlign = 'center';
      ctx.fillText(b.hp, b.x + b.w / 2, b.y + b.h / 2 + 3);
    }
  }

  // Paddle
  ctx.fillStyle = C.paddle;
  ctx.beginPath();
  roundRect(ctx, paddle.x, paddle.y, paddle.w, paddle.h, 5);
  ctx.fill();

  // Paddle glow
  ctx.shadowColor = C.paddle;
  ctx.shadowBlur = 12;
  ctx.fillStyle = C.paddle;
  ctx.beginPath();
  roundRect(ctx, paddle.x, paddle.y, paddle.w, paddle.h, 5);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Ball
  ctx.fillStyle = C.ball;
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Ball trail
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.beginPath();
  ctx.arc(ball.x - ball.vx * 1.5, ball.y - ball.vy * 1.5, ball.r * 0.7, 0, Math.PI * 2);
  ctx.fill();

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Attached hint
  if (ball.attached && state === 'playing') {
    ctx.fillStyle = 'rgba(232,96,76,0.5)';
    ctx.font = '11px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillText('CLICK TO LAUNCH', BASE_W / 2, BASE_H / 2);
  }

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
}

// ── Game loop ──
function loop() {
  if (state === 'playing') update();
  draw();
  animId = requestAnimationFrame(loop);
}

// ── State transitions ──
function startGame() {
  score = 0; lives = 3; level = 1;
  $('hScore').textContent = 0;
  $('hLives').textContent = 3;
  $('hLevel').textContent = 1;
  particles = [];
  makeBricks(1);
  resetPaddle();
  resetBall();
  state = 'playing';
  $('oStart').classList.add('hidden');
  $('oEnd').classList.add('hidden');
  $('oLevel').classList.add('hidden');
  if (!animId) loop();
}

function gameOver() {
  state = 'dead';
  $('finalScore').textContent = score;
  $('endMsg').innerHTML = `LEVEL ${level}까지 도달<br>LIVES 0`;
  $('oEnd').classList.remove('hidden');
}

function levelClear() {
  level++;
  if (level > 10) {
    // Win!
    state = 'dead';
    $('finalScore').textContent = score;
    $('endMsg').innerHTML = `🏆 ALL CLEAR!<br>모든 레벨을 클리어했다!`;
    $('oEnd').classList.remove('hidden');
    return;
  }
  state = 'levelup';
  $('hLevel').textContent = level;
  $('lvlTitle').textContent = `LEVEL ${level}`;
  $('oLevel').classList.remove('hidden');
}

function nextLevel() {
  makeBricks(level);
  resetPaddle();
  resetBall();
  particles = [];
  state = 'playing';
  $('oLevel').classList.add('hidden');
}

// ── Buttons ──
$('bStart').addEventListener('click', startGame);
$('bRestart').addEventListener('click', startGame);
$('bNext').addEventListener('click', nextLevel);

// ── Keyboard support ──
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    if (state === 'start') startGame();
    else if (state === 'playing' && ball.attached) launchBall();
    else if (state === 'dead') startGame();
    else if (state === 'levelup') nextLevel();
  }
});

// Start render loop (paused state, just draws)
loop();
</script>
</body>
</html>
